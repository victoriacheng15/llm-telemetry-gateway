apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: node-exporter-policy
  namespace: telemetry
spec:
  podSelector:
    matchLabels:
      app: node-exporter
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: otel-collector
    ports:
    - protocol: TCP
      port: 9100
