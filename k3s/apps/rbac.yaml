apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gateway-chaos-manager
  namespace: gateway
rules:
- apiGroups: ["chaos-mesh.org"]
  resources: ["stresschaos", "networkchaos"]
  verbs: ["get", "list", "create", "delete", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway-chaos-manager-binding
  namespace: gateway
subjects:
- kind: ServiceAccount
  name: default
  namespace: gateway
roleRef:
  kind: Role
  name: gateway-chaos-manager
  apiGroup: rbac.authorization.k8s.io
