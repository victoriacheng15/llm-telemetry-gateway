apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-chaos-manager
  namespace: gateway
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gateway-chaos-manager-cluster
rules:
- apiGroups: [""]
  resources: ["pods", "namespaces"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["chaos-mesh.org"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gateway-chaos-manager-cluster-binding
subjects:
- kind: ServiceAccount
  name: gateway-chaos-manager
  namespace: gateway
roleRef:
  kind: ClusterRole
  name: gateway-chaos-manager-cluster
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
metadata:
  name: gateway-chaos-manager-token
  namespace: gateway
  annotations:
    kubernetes.io/service-account.name: gateway-chaos-manager
type: kubernetes.io/service-account-token