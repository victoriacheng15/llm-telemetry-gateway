apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: gateway
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      serviceAccountName: gateway-chaos-manager
      containers:
      # 1. Go Proxy Data Plane Container
      - name: gateway
        image: alpine/k8s:1.31.0
        workingDir: /app
        securityContext:
          runAsUser: 0
        command: ["sh", "-c", "/app/bin/gateway 2>&1 | tee /tmp/shared/gateway.log"]
        env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.telemetry.svc.cluster.local:4317"
        - name: LIMITS_CPU
          valueFrom:
            resourceFieldRef:
              containerName: gateway
              resource: limits.cpu
        - name: LIMITS_MEMORY
          valueFrom:
            resourceFieldRef:
              containerName: gateway
              resource: limits.memory
        volumeMounts:
        - name: shared-uds
          mountPath: /tmp/shared
        - name: project-code
          mountPath: /app
        ports:
        - containerPort: 8080
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

      # 2. Python Policy Sidecar Container
      - name: sidecar
        image: python:3.13-slim
        command: ["python", "/app/cmd/sidecar/policy.py"]
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        volumeMounts:
        - name: shared-uds
          mountPath: /tmp/shared
        - name: project-code
          mountPath: /app
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

      volumes:
      - name: shared-uds
        emptyDir:
          medium: Memory
      - name: project-code
        hostPath:
          path: /opt/llm-telemetry-gateway
          type: Directory
