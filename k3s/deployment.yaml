apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-telemetry-gateway
  namespace: gateway
  labels:
    app: llm-telemetry-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-telemetry-gateway
  template:
    metadata:
      labels:
        app: llm-telemetry-gateway
    spec:
      containers:
      # 1. Go Proxy Data Plane Container
      - name: gateway
        image: alpine:latest # Placeholder stub for local Go binary execution
        command: ["/bin/sh", "-c", "echo 'Go Data Plane stub active' && sleep 3600"]

      # 2. Python Policy Sidecar Container
      - name: sidecar
        image: python:3.13-slim # Placeholder stub for local Python script execution
        command: ["/bin/sh", "-c", "echo 'Python Sidecar stub active' && sleep 3600"]
