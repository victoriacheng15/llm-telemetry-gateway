apiVersion: v1
kind: LimitRange
metadata:
  name: telemetry-limit-range
  namespace: telemetry
spec:
  limits:
  - max:                  # <-- Hard Validation Ceiling (Rejects pods exceeding this)
      cpu: "1"
      memory: 2Gi
    min:                  # <-- Hard Validation Floor (Rejects pods requesting less than this)
      cpu: 50m
      memory: 64Mi
    default:              # <-- Fallback Default Limit (Injected automatically if not declared)
      cpu: 500m
      memory: 1Gi
    defaultRequest:       # <-- Fallback Default Request (Injected automatically if not declared)
      cpu: 100m
      memory: 256Mi
    type: Container
