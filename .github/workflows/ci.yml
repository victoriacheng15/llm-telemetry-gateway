name: Continuous Integration

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.go'
      - '**/*.py'
      - 'go.mod'
      - 'go.sum'
      - 'requirements.txt'
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.go'
      - '**/*.py'
      - 'go.mod'
      - 'go.sum'
      - 'requirements.txt'

env:
  python-version: '3.13'
  go-version: '1.26'

jobs:
  python-ci:
    name: Python Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.python-version }}
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          make install

      - name: Run Python Linting
        run: |
          make lint-py

      - name: Run Python Unit Tests
        run: |
          make test-py

  go-ci:
    name: Go Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.go-version }}
          cache: true

      - name: Run Go Linting
        run: |
          make lint-go

      - name: Run Go Unit Tests
        run: |
          make test-go
